<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-semibold text-gray-900 mb-6 text-center">Connexion Admin</h2>
    
    <form (ngSubmit)="login()" [formGroup]="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Clé API Admin</label>
        <input 
          type="password" 
          formControlName="token"
          class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
          placeholder="Entrez votre token..."
        >
      </div>
      
      <button 
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition"
      >
        Se connecter
      </button>
    </form>
  </div>
</div>
