<div class="bg-white p-8 rounded-lg shadow w-full max-w-4xl">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Ajouter un Artisan</h2>

  <div *ngIf="successMessage" class="mb-4 p-4 bg-green-100 text-green-700 rounded border border-green-400">
    {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-100 text-red-700 rounded border border-red-400">
    {{ errorMessage }}
    </div>
  
  <form [formGroup]="artisanForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium">Prénom</label>
        <input formControlName="firstName" class="w-full border p-2 rounded">
      </div>
      <div>
        <label class="block text-sm font-medium">Nom</label>
        <input formControlName="lastName" class="w-full border p-2 rounded">
      </div>
    </div>
    
    <div>
      <label class="block text-sm font-medium">Numéro WhatsApp (ex: 22507...)</label>
      <input formControlName="phoneNumber" class="w-full border p-2 rounded">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="relative">
    <label class="block text-sm font-medium">Profession</label>
    <input type="text" formControlName="profession" 
           (input)="filterList('profession', $event)"
           (focus)="showProfessionList = true"
           class="w-full border p-2 rounded">
    <div *ngIf="showProfessionList" class="absolute z-10 w-full bg-white border mt-1 max-h-40 overflow-y-auto shadow-lg">
      <div *ngFor="let p of filteredProfessions" 
           (mousedown)="selectItem('profession', p)"
           class="p-2 hover:bg-blue-100 cursor-pointer">
        {{ p.name }}
      </div>
    </div>
  </div>

  <div class="relative">
    <label class="block text-sm font-medium">Zone d'intervention</label>
    <input type="text" formControlName="zone" 
           (input)="filterList('zone', $event)"
           (focus)="showZoneList = true"
           class="w-full border p-2 rounded">
    <div *ngIf="showZoneList" class="absolute z-10 w-full bg-white border mt-1 max-h-40 overflow-y-auto shadow-lg">
      <div *ngFor="let z of filteredZones" 
           (mousedown)="selectItem('zone', z)"
           class="p-2 hover:bg-blue-100 cursor-pointer">
        {{ z.name }}
      </div>
    </div>
  </div>
    </div>

    <button type="submit" [disabled]="artisanForm.invalid" 
            class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 disabled:bg-gray-400">
      Enregistrer l'artisan
    </button>
  </form>
</div>
